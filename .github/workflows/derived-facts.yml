name: derived-facts
# Derive org facts from the signed lattice. NO signing — a derived fact re-derives
# itself (its basis is the recompute), so a signature adds nothing. Nudged on a
# schedule + lattice update; opens a PR when the value changes (sign-on-change).
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [lattice-updated]
permissions:
  contents: write
  pull-requests: write
jobs:
  derive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/synoptic, ref: v0.5.0, path: .synoptic, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "22" }
      - run: node .synoptic/derive.mjs data/derive.model.json --out data/derived-facts.json
      - uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          branch: chore/refresh-derived-facts
          title: "chore: refresh derived facts (recomputed, unsigned)"
          commit-message: "chore: refresh derived facts from the signed lattice"
          body: "Recomputed org facts. No signature — a derived fact's basis is the recompute."
