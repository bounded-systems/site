name: prose-proxies
# Layer-correct prose-proxy gates (report-mode). Word-choice gates run over ALL
# prose (pages + blog); doc-scope (one-topic + length) runs over the COMPOSED docs
# only — a landing page is a different shape. Non-blocking, like focus-budget;
# flip to --strict once the copy is cleared.
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  prose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: build the prose corpora (pages + composed blog)
        run: node scripts/gen-prose-corpus.mjs
      - name: claim discipline — all prose (report-only)
        continue-on-error: true
        run: node scripts/check-claim-discipline.mjs prose-corpus.json
      - name: grammar repetition — all prose (report-only)
        continue-on-error: true
        run: node scripts/check-grammar-repetition.mjs prose-corpus.json
      - name: doc scope — composed docs only (report-only)
        continue-on-error: true
        run: node scripts/check-doc-scope.mjs doc-corpus.json
