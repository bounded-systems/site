name: publish-verify

# Publish @bounded-systems/verify to JSR (jsr.io) — KEYLESS, via this workflow's
# GitHub OIDC identity. No stored token: the publish is authenticated by the same
# short-lived OIDC the rest of this project signs with, and JSR records its own
# provenance from it. (npm would need a long-lived NPM_TOKEN secret — off-key for a
# keyless-provenance project, which is why this targets JSR.)
#
# Triggered by a GitHub Release whose tag starts with `verify-v`, or manually.
# Prerequisite (one-time, yours): create the `@bounded-systems` scope on jsr.io and
# link this repo. Then cut a `verify-v0.1.0` release. `--allow-slow-types` because
# verify.mjs is plain JS (no TS types) — JSR publishes it, just can't fast-type it.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # JSR keyless publish (OIDC)

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'verify-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrity/verify
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install (Node deps for the smoke test)
        run: npm ci
      - name: Verify it runs before publishing
        run: node verify.mjs https://bounded.tools
      - name: Publish to JSR (keyless, GitHub OIDC)
        run: npx jsr publish --allow-slow-types
