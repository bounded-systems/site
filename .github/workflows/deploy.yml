name: deploy

# Two-phase, promote-the-artifact pipeline:
#   build   — hermetic nix build → keyless-sign the whole site (Sigstore) →
#             publish a SIGNED, fully-deployable OCI artifact to GHCR.
#   deploy  — pull THAT artifact, cosign-verify it, and wrangler-deploy exactly
#             those bytes. So prod serves the signed artifact by construction,
#             not a re-staged copy. Fail-closed: a signing/verify failure blocks
#             the deploy, and the edge check asserts the provenance reached prod.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC: lets cosign mint a keyless Fulcio cert for build provenance
  packages: write # push the built site to GHCR as a signed OCI artifact

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      oci: ${{ steps.publish.outputs.oci }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      # Hermetic build: nodejs + brand are pinned by flake.lock. Same bytes on
      # every machine; runs the brand token-drift check, then assembles dist/.
      - name: Build (nix)
        run: nix build .#site -L

      - name: Stage dist
        run: cp -rL result dist && chmod -R u+w dist

      # main only: content-address the whole site, keyless-sign that manifest
      # (no stored key — the Actions OIDC identity mints a one-build Fulcio cert,
      # logged in Rekor), write /provenance.json, then publish the WHOLE dist/
      # (site + provenance sidecars) to GHCR as one signed, deployable OCI
      # artifact. The deploy job promotes exactly this artifact.
      - name: Sign + publish the signed OCI artifact (keyless Sigstore → GHCR)
        id: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_REPO: ghcr.io/bounded-systems/bounded-tools-site
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            short=$(printf "%s" "$GITHUB_SHA" | cut -c1-7)
            # stamp the honesty section with THIS commit + date (freshness the
            # visitor can see) BEFORE manifesting, so the stamp is covered by the
            # signed whole-site manifest rather than an unsigned afterthought.
            node scripts/gen-stamp.mjs
            # Fail closed if the vendored conformance-kit drifted from its hash-pin.
            node scripts/verify-vendor.mjs
            # The deterministic SPDX SBOM is already in dist/ from the hermetic build;
            # refuse to ship an incomplete bill, then emit the standards-compliant
            # sidecars (RFC 9116 security.txt, web app manifest, RFC 9530 Repr-Digest
            # _headers) onto the final, stamped bytes — all BEFORE the manifest, so the
            # signed whole-site digest covers them (the SBOM becomes a signed subject).
            node vendor/conformance-kit/gates/sbom/check-sbom.mjs
            node scripts/emit-artifacts.mjs
            # whole-site manifest (covers content + sbom + security.txt + manifest;
            # _headers and the signature bundles are excluded), signed
            node scripts/gen-sitemanifest.mjs
            cosign sign-blob --yes --bundle dist/site.sha256.sigstore.json dist/site.sha256
            # also keyless-sign the SBOM blob itself, so it carries its own verifiable
            # Sigstore bundle alongside being a subject of the signed site manifest
            cosign sign-blob --yes --bundle dist/sbom.spdx.json.sigstore.json dist/sbom.spdx.json
            # /provenance.json (Rekor index from the bundle; OCI digest resolved at verify)
            OCI_REF="$GHCR_REPO:$short" node scripts/gen-provenance.mjs
            # pack the WHOLE dist/ (site + provenance sidecars) → one deployable artifact
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime=@0 -C dist -cf site.tar .
            gzip -n -f site.tar
            printf "%s" "$GITHUB_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            oras push "$GHCR_REPO:$short" \
              --artifact-type application/vnd.bounded.site.v1+gzip \
              site.tar.gz:application/gzip | tee oras-push.log
            oras tag "$GHCR_REPO:$short" latest
            digest=$(awk "/Digest:/ {print \$2}" oras-push.log)
            printf "%s" "$GITHUB_TOKEN" | cosign login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cosign sign --yes "$GHCR_REPO@$digest"
            echo "oci=$GHCR_REPO@$digest" >> "$GITHUB_OUTPUT"
          '


  # DEPLOY: hand the signed artifact to the CANONICAL reusable pipeline (preview → deterministic
  # preview-URL verify → gated promote) — the same source of truth as robertdelanghe.dev. The
  # required-reviewers `site-promote` Environment lives in THIS repo, so approval is enforced here.
  # This ADDS an approval gate bounded.tools didn't have before (was straight build→deploy).
  # (Pinned to the opt-in-probe branch until bounded-systems/.github#42 merges; then -> @<sha>.)
  deploy:
    needs: build
    if: needs.build.outputs.oci != ''
    uses: bounded-systems/.github/.github/workflows/site-deploy.yml@c46a1dc7b8e6b2a9ad146bffb93a80f8689dd34e # main
    with:
      oci: ${{ needs.build.outputs.oci }}
      domain: "https://bounded.tools"
      identity_regexp: "^https://github.com/bounded-systems/site/"
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
