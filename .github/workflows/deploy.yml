name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC: lets cosign mint a keyless Fulcio cert for build provenance
  packages: write # push the built site to GHCR as a signed OCI artifact

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      # Hermetic build: nodejs + brand are pinned by flake.lock. Runs the brand
      # token-drift check, then assembles dist/. Same artifact on every machine.
      - name: Build (nix)
        run: nix build .#site -L

      - name: Stage dist for wrangler
        run: cp -rL result dist && chmod -R u+w dist

      # Build provenance for the ENTIRE site, keyless (Sigstore), no stored key.
      # The Actions OIDC identity authenticates to Fulcio, which mints a
      # short-lived signing cert; signatures + their Rekor inclusion proofs are
      # public. This proves WHO built the site and that it is intact — not that
      # the build was safe (see blog/provenance-is-not-legitimacy).
      # Only on main (the deployed path); cosign + oras are pinned in the deploy shell.
      #
      # (1) Whole-site manifest: sha256 of every served file, keyless-signed and
      #     served, so the live bytes are verifiable in place (cosign verify-blob
      #     + sha256sum -c).
      - name: Sign the whole site (keyless Sigstore)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            node scripts/gen-sitemanifest.mjs
            cosign sign-blob --yes \
              --bundle dist/site.sha256.sigstore.json \
              dist/site.sha256
          '

      # (2) Whole dist/ → GHCR as a pullable, versioned OCI artifact, cosign-signed
      #     by digest. The tar excludes the provenance sidecars so the artifact
      #     scope matches the signed manifest scope exactly. gen-provenance.mjs
      #     then writes /provenance.json tying both attestations together.
      - name: Publish + sign the site as an OCI artifact (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_REPO: ghcr.io/bounded-systems/bounded-tools-site
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            short=$(printf "%s" "$GITHUB_SHA" | cut -c1-7)
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime=@0 \
              --exclude=./site.sha256 --exclude=./site.sha256.sigstore.json --exclude=./provenance.json \
              -C dist -cf site.tar .
            gzip -n -f site.tar
            printf "%s" "$GITHUB_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            oras push "$GHCR_REPO:$short" \
              --artifact-type application/vnd.bounded.site.v1+gzip \
              site.tar.gz:application/gzip | tee oras-push.log
            oras tag "$GHCR_REPO:$short" latest
            digest=$(awk "/Digest:/ {print \$2}" oras-push.log)
            printf "%s" "$GITHUB_TOKEN" | cosign login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cosign sign --yes "$GHCR_REPO@$digest"
            OCI_REF="$GHCR_REPO:$short" OCI_DIGEST="$digest" node scripts/gen-provenance.mjs
          '

      # Deploy only on main, and only if the token secret is configured —
      # so the build stays green before the secret is added.
      - name: Check for deploy secret
        id: gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set — built dist/ but skipped deploy."
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.gate.outputs.ready == 'true'
        run: nix develop .#deploy --command wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Prove the edge actually serves the bytes we just built. Workers Static
      # Assets revalidate on a content-hash ETag, so a successful deploy should
      # self-invalidate (no purge needed). This asserts that rather than trusting
      # it — failing loudly if the edge serves something stale.
      - name: Verify edge serves the deployed asset
        if: steps.gate.outputs.ready == 'true'
        run: |
          if [ ! -f dist/styles.css ]; then
            echo "::error::dist/styles.css not found — build layout changed?"; exit 1
          fi
          expected=$(sha256sum dist/styles.css | cut -d' ' -f1)
          echo "expected sha256=$expected"
          for i in 1 2 3 4 5; do
            live=$(curl -fsS https://bounded.tools/styles.css | sha256sum | cut -d' ' -f1) || live="(fetch failed)"
            if [ "$live" = "$expected" ]; then
              echo "edge serves freshly-deployed styles.css ✓"
              exit 0
            fi
            echo "edge not fresh yet (attempt $i/5): live=$live"
            sleep 10
          done
          echo "::error::Edge still serving stale styles.css ~50s after deploy (expected $expected)"
          exit 1
