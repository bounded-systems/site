name: deploy

# Two-phase, promote-the-artifact pipeline:
#   build   — hermetic nix build → keyless-sign the whole site (Sigstore) →
#             publish a SIGNED, fully-deployable OCI artifact to GHCR.
#   deploy  — pull THAT artifact, cosign-verify it, and wrangler-deploy exactly
#             those bytes. So prod serves the signed artifact by construction,
#             not a re-staged copy. Fail-closed: a signing/verify failure blocks
#             the deploy, and the edge check asserts the provenance reached prod.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC: lets cosign mint a keyless Fulcio cert for build provenance
  packages: write # push the built site to GHCR as a signed OCI artifact

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      oci: ${{ steps.publish.outputs.oci }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      # Hermetic build: nodejs + brand are pinned by flake.lock. Same bytes on
      # every machine; runs the brand token-drift check, then assembles dist/.
      - name: Build (nix)
        run: nix build .#site -L

      - name: Stage dist
        run: cp -rL result dist && chmod -R u+w dist

      # main only: content-address the whole site, keyless-sign that manifest
      # (no stored key — the Actions OIDC identity mints a one-build Fulcio cert,
      # logged in Rekor), write /provenance.json, then publish the WHOLE dist/
      # (site + provenance sidecars) to GHCR as one signed, deployable OCI
      # artifact. The deploy job promotes exactly this artifact.
      - name: Sign + publish the signed OCI artifact (keyless Sigstore → GHCR)
        id: publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_REPO: ghcr.io/bounded-systems/bounded-tools-site
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            short=$(printf "%s" "$GITHUB_SHA" | cut -c1-7)
            # whole-site manifest (content only — sidecars do not exist yet), signed
            node scripts/gen-sitemanifest.mjs
            cosign sign-blob --yes --bundle dist/site.sha256.sigstore.json dist/site.sha256
            # /provenance.json (Rekor index from the bundle; OCI digest resolved at verify)
            OCI_REF="$GHCR_REPO:$short" node scripts/gen-provenance.mjs
            # pack the WHOLE dist/ (site + provenance sidecars) → one deployable artifact
            tar --sort=name --owner=0 --group=0 --numeric-owner --mtime=@0 -C dist -cf site.tar .
            gzip -n -f site.tar
            printf "%s" "$GITHUB_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            oras push "$GHCR_REPO:$short" \
              --artifact-type application/vnd.bounded.site.v1+gzip \
              site.tar.gz:application/gzip | tee oras-push.log
            oras tag "$GHCR_REPO:$short" latest
            digest=$(awk "/Digest:/ {print \$2}" oras-push.log)
            printf "%s" "$GITHUB_TOKEN" | cosign login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cosign sign --yes "$GHCR_REPO@$digest"
            echo "oci=$GHCR_REPO@$digest" >> "$GITHUB_OUTPUT"
          '

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Promote only a real, signed artifact, on main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.oci != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea # v19

      # Deploy only if the token secret is configured — so the pipeline stays
      # green before the secret is added.
      - name: Check for deploy secret
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN not set — signed artifact published, skipped deploy."
          fi

      # Promote: pull the SIGNED artifact, verify its keyless signature against
      # this repo's identity, and unpack exactly those bytes into dist/. If verify
      # fails, the job fails and nothing ships.
      - name: Pull + verify the signed OCI artifact
        if: steps.gate.outputs.ready == 'true'
        env:
          OCI: ${{ needs.build.outputs.oci }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix develop .#deploy --command bash -euo pipefail -c '
            printf "%s" "$GITHUB_TOKEN" | cosign login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cosign verify "$OCI" \
              --certificate-identity-regexp "^https://github.com/bounded-systems/site/" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com > /dev/null
            printf "%s" "$GITHUB_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            rm -rf oci-out dist && mkdir -p oci-out dist
            oras pull "$OCI" -o oci-out
            tar -xzf oci-out/site.tar.gz -C dist
          '

      - name: Deploy to Cloudflare Workers
        if: steps.gate.outputs.ready == 'true'
        run: nix develop .#deploy --command wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Assert the provenance reached prod: the edge must serve the freshly-signed
      # whole-site manifest (byte-identical) + provenance.json. Fails loudly if
      # prod is stale or missing them, so a deploy that drops the provenance can't
      # pass silently.
      - name: Verify prod serves the signed provenance
        if: steps.gate.outputs.ready == 'true'
        run: |
          expected=$(sha256sum dist/site.sha256 | cut -d' ' -f1)
          echo "expected site.sha256=$expected"
          for i in 1 2 3 4 5; do
            live=$(curl -fsS https://bounded.tools/site.sha256 | sha256sum | cut -d' ' -f1) || live="(fetch failed)"
            code=$(curl -fsS -o /dev/null -w '%{http_code}' https://bounded.tools/provenance.json) || code="000"
            if [ "$live" = "$expected" ] && [ "$code" = "200" ]; then
              echo "prod serves the freshly-signed whole-site manifest + provenance.json ✓"
              exit 0
            fi
            echo "edge not fresh yet (attempt $i/5): manifest=$live provenance=$code"
            sleep 10
          done
          echo "::error::prod is not serving the freshly-signed provenance (manifest or provenance.json)"
          exit 1
