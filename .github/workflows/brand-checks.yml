name: brand-checks

# Gate this surface against the shared design + content system
# (@bounded-systems/brand): meta + agent-readiness, content tokens (schema +
# Gherkin + lint), coverage report. Copy hygiene now runs upstream via the
# string-audit reusable gate (the `copy` job), so the prose rules live in one
# place and propagate when the pin is bumped.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Resolve installed brand version
        id: brand-version
        run: echo "version=$(node -p "require('./node_modules/@bounded-systems/brand/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Checkout brand's source (dev tooling only — not published to npm)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: bounded-systems/brand
          ref: v${{ steps.brand-version.outputs.version }}
          path: brand
      - name: Content catalog is current (extracted prose surfaces)
        # The copy job gates data/audit/catalog.json; fail early if it drifted from source.
        run: node scripts/emit-catalog.mjs --check
      - name: Build dist/
        run: node build.mjs
      - name: Meta + agent-readiness
        run: node brand/tools/meta.mjs --check dist
      - name: Content tokens (schema + Gherkin + lint)
        run: node brand/tools/content.mjs --check .
      - name: No hardcoded colours (all colours are tokens)
        run: node brand/tools/coverage.mjs --colors --check dist
      - name: Accessibility (WCAG AA contrast + headings)
        run: node brand/tools/a11y.mjs --check dist
      - name: Claims graphs are well-formed (graded, gap-disclosed, evidence-linked, secured)
        # Zero-dep gate: every integrity/claims/ graph must be a valid nanopublication —
        # each claim graded, a non-enforced claim discloses its gap, evidence is an
        # absolute URL, and the graph names how it's secured. Structure, not truth.
        run: |
          for f in integrity/claims/*.jsonld; do
            node integrity/claims/validate-claims.mjs "$f"
          done

  # The brand is pinned twice: in flake.lock (the hermetic Nix build that deploy.yml
  # ships) and as the @bounded-systems/brand npm dependency (npm run dev + the checks
  # above). They must resolve to the same release — when they drift, the deployed CSS
  # can silently lag the styles that reference it. That is exactly how the grade
  # badges shipped with empty var(--bs-grade-*) values: the (then-)submodule was
  # bumped but flake.lock was never relocked. npm's pin is a semver version, not a
  # git commit, so this resolves it to the exact commit via the release tag
  # (mint release always tags v<version> at the commit it cuts the release from)
  # and compares that to flake.lock's pinned rev.
  brand-pins-agree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: flake.lock brand rev == npm-pinned release commit
        run: |
          lock_rev="$(jq -r '.nodes.brand.locked.rev' flake.lock)"
          npm_version="$(node -p "require('./node_modules/@bounded-systems/brand/package.json').version")"
          tag_rev="$(git ls-remote https://github.com/bounded-systems/brand.git "refs/tags/v${npm_version}" | cut -f1)"
          echo "flake.lock brand:        $lock_rev"
          echo "npm brand@$npm_version tag: $tag_rev"
          if [ -z "$tag_rev" ]; then
            echo "::error::no v$npm_version tag found on bounded-systems/brand — can't verify the pin."
            exit 1
          fi
          if [ "$lock_rev" != "$tag_rev" ]; then
            echo "::error::brand pins diverged. Run 'nix flake update brand' and/or bump the @bounded-systems/brand npm dependency so both resolve to the same release."
            exit 1
          fi
          echo "✓ brand pins agree ($lock_rev, v$npm_version)"

  # Whole-page structure gate (vendored conformance-kit structure-audit): reader
  # survivability (Mozilla Readability) + outline + landmarks + internal link-graph,
  # with a content-addressed structure.json checked for drift — sibling to the copy
  # catalog. The tool is now the ONE vendored copy under vendor/conformance-kit/; its
  # deps (linkedom + readability) come from the kit's package-lock, and the drift
  # BASELINE stays here in the consumer ($STRUCTURE_BASELINE) so a re-vendor can't
  # mutate it.
  structure-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Install conformance-kit gate deps
        run: npm ci --prefix vendor/conformance-kit
      - name: Build dist/ (full site, incl. blog posts)
        run: npm run build
      - name: Structure is intact + structure.json is current
        env:
          STRUCTURE_BASELINE: integrity/structure-audit/structure.json
        run: node vendor/conformance-kit/integrity/structure-audit/audit.mjs dist --check

  # Structured-data + supply-chain gates from the vendored conformance-kit:
  #   • SHACL — turn the schema.org JSON-LD (Organization in index.html, BlogPosting
  #     in each post) into an ENFORCEABLE contract via contract/jsonld.shapes.ttl.
  #   • SBOM — the deterministic SPDX SBOM is generated + completeness-checked inside
  #     `npm run build`; re-asserted here as a named, fail-closed gate step.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Install conformance-kit gate deps
        run: npm ci --prefix vendor/conformance-kit
      - name: Verify the vendored conformance-kit hash-pin
        run: node scripts/verify-vendor.mjs
      - name: Known vulnerabilities (0 critical/high; re-proves evidence.vulns)
        env:
          VULN_OMIT_DEV: "false"
        run: node vendor/conformance-kit/gates/vuln-gate.mjs
      - name: Build dist/ (full site; generates + checks the SPDX SBOM)
        run: npm run build
      - name: HTML validity (Nu HTML Checker, 0 errors; re-proves evidence.htmlValidator)
        run: node vendor/conformance-kit/gates/html-validator-gate.mjs dist
      - name: SBOM completeness (SPDX-2.3, pinned-set ⊆ SBOM ⊆ pinned-set)
        run: node vendor/conformance-kit/gates/sbom/check-sbom.mjs
      - name: JSON-LD conforms to the SHACL contract
        run: node vendor/conformance-kit/gates/shacl-runner.mjs contract/jsonld.shapes.ttl dist

  # Copy hygiene (prose error + ungrounded claims) via the upstream string-audit
  # reusable gate. Pinned to an immutable commit SHA (v0.6.1) for reproducibility;
  # bump the pin to pick up upstream rule changes. build-cmd regenerates the
  # content-addressed catalog so the gate always sees the current prose.
  copy:
    uses: bounded-systems/string-audit/.github/workflows/audit.yml@2d9153d219eed4ef3d9cf979f1bd04f510a04f00 # v0.6.1
    with:
      ref: 2d9153d219eed4ef3d9cf979f1bd04f510a04f00 # v0.6.1
      build-cmd: node scripts/emit-catalog.mjs
      catalog: data/audit/catalog.json
      grounding: data/audit/grounding.json
      strict: true
