name: brand-checks

# Gate this surface against the shared design + content system (the brand submodule):
#   meta + agent-readiness, content tokens (schema + Gherkin + lint), coverage report.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Build dist/
        run: node build.mjs
      - name: Meta + agent-readiness
        run: node brand/tools/meta.mjs --check dist
      - name: Content tokens (schema + Gherkin + lint)
        run: node brand/tools/content.mjs --check .
      - name: Design-system coverage (report)
        run: node brand/tools/coverage.mjs .
