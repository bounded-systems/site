name: brand-checks

# Gate this surface against the shared design + content system (the brand submodule):
#   meta + agent-readiness, content tokens (schema + Gherkin + lint), coverage report.
# Copy hygiene now runs upstream via the string-audit reusable gate (the `copy` job),
# so the prose rules live in one place and propagate when the pin is bumped.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Content catalog is current (extracted prose surfaces)
        # The copy job gates data/audit/catalog.json; fail early if it drifted from source.
        run: node scripts/emit-catalog.mjs --check
      - name: Build dist/
        run: node build.mjs
      - name: Meta + agent-readiness
        run: node brand/tools/meta.mjs --check dist
      - name: Content tokens (schema + Gherkin + lint)
        run: node brand/tools/content.mjs --check .
      - name: No hardcoded colours (all colours are tokens)
        run: node brand/tools/coverage.mjs --colors --check dist
      - name: Accessibility (WCAG AA contrast + headings)
        run: node brand/tools/a11y.mjs --check dist

  # The brand is pinned twice: in flake.lock (the hermetic Nix build that deploy.yml
  # ships) and as the git submodule (npm run dev + the checks above). They must point
  # at the same commit — when they drift, the deployed CSS can silently lag the styles
  # that reference it. That is exactly how the grade badges shipped with empty
  # var(--bs-grade-*) values: the submodule was bumped but flake.lock was never relocked.
  brand-pins-agree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: flake.lock brand rev == submodule rev
        run: |
          lock_rev="$(jq -r '.nodes.brand.locked.rev' flake.lock)"
          sub_rev="$(git ls-tree HEAD brand | awk '{print $3}')"
          echo "flake.lock brand: $lock_rev"
          echo "submodule  brand: $sub_rev"
          if [ "$lock_rev" != "$sub_rev" ]; then
            echo "::error::brand pins diverged. Run 'nix flake update brand' and 'git submodule update --remote brand' so both point at the same commit."
            exit 1
          fi
          echo "✓ brand pins agree ($lock_rev)"

  # Copy hygiene (prose error + ungrounded claims) via the upstream string-audit
  # reusable gate. Pinned to an immutable commit SHA (v0.6.1) for reproducibility;
  # bump the pin to pick up upstream rule changes. build-cmd regenerates the
  # content-addressed catalog so the gate always sees the current prose.
  copy:
    uses: bounded-systems/string-audit/.github/workflows/audit.yml@2d9153d219eed4ef3d9cf979f1bd04f510a04f00 # v0.6.1
    with:
      ref: 2d9153d219eed4ef3d9cf979f1bd04f510a04f00 # v0.6.1
      build-cmd: node scripts/emit-catalog.mjs
      catalog: data/audit/catalog.json
      grounding: data/audit/grounding.json
      strict: true
