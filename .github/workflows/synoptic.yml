name: synoptic
# Layered validation via the shared engine. On PRs: validate (report). On push to
# main: validate --attest + cosign-sign each check's in-toto Statement via the
# workflow's OIDC identity (keyless Sigstore → Fulcio → Rekor) — a signed,
# verifiable per-check result, bottom layer up.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # OIDC — cosign keyless
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/synoptic, path: .synoptic, persist-credentials: false }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/conformance-kit, ref: v0.12.0, path: .conformance-kit, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "22" }
      - run: node .synoptic/generators/gen-prose-corpus.mjs
      - name: validate (+ attest on main)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CK_GATES="$PWD/.conformance-kit/gates" node .synoptic/validate.mjs --attest attestations
          else
            CK_GATES="$PWD/.conformance-kit/gates" node .synoptic/validate.mjs
          fi
      - name: install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.7.0
      - name: sign each check attestation (keyless, OIDC)
        if: github.event_name == 'push'
        run: |
          for f in attestations/*.intoto.json; do
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
            echo "signed $f"
          done
      - name: upload signed check attestations
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with: { name: check-attestations, path: attestations/ }
