name: synoptic
# Prose validation now lives in the synoptic engine, not this repo. This caller
# checks out the pinned engine + kit and runs `synoptic validate` over the site's
# declared layers (synoptic.config.json). Report-only; --strict once copy's cleared.
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: fetch the pinned engine
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/synoptic, path: .synoptic, persist-credentials: false }
      - name: fetch the pinned gates
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/conformance-kit, ref: v0.12.0, path: .conformance-kit, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "22" }
      - name: build corpora (engine generator)
        run: node .synoptic/generators/gen-prose-corpus.mjs
      - name: synoptic validate
        run: CK_GATES="$PWD/.conformance-kit/gates" node .synoptic/validate.mjs
