name: synoptic
# The engine builds + validates the site. Gates live in synoptic (config-driven);
# this repo just declares them. PRs: build + validate (report). Push to main:
# + attest each check, cosign-sign (keyless OIDC → Rekor), verify.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
env:
  SIGNER_IDENTITY: https://github.com/bounded-systems/site/.github/workflows/synoptic.yml@refs/heads/main
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/synoptic, ref: v0.1.0, path: .synoptic, persist-credentials: false }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { repository: bounded-systems/conformance-kit, ref: v0.12.0, path: .conformance-kit, persist-credentials: false }
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: { node-version: "22" }
      - run: npm ci
      - run: npm run build            # dist/ incl. json.ld — the engine checks the built site
      - run: node .synoptic/generators/gen-prose-corpus.mjs
      - name: validate (all declared gates via the engine)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CK_GATES="$PWD/.conformance-kit/gates" node .synoptic/validate.mjs --attest attestations
          else
            CK_GATES="$PWD/.conformance-kit/gates" node .synoptic/validate.mjs
          fi
      - name: install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.7.0
      - name: sign each check attestation (keyless, OIDC)
        if: github.event_name == 'push'
        run: for f in attestations/*.intoto.json; do cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"; done
      - name: verify the checks
        if: github.event_name == 'push'
        run: node .synoptic/verify.mjs attestations --identity "$SIGNER_IDENTITY"
      - name: upload signed check attestations
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with: { name: check-attestations, path: attestations/ }
