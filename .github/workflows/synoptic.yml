name: synoptic
# The whole site CI lives in synoptic (site-ci.yml). This repo just calls it and
# configures via synoptic.config.json. No CI implementation here.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  site:
    uses: bounded-systems/synoptic/.github/workflows/site-ci.yml@v0.3.0
    permissions:
      contents: read
      id-token: write
